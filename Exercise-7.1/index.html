<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Typography</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

    <div class="container mt-5">

        <h1 class="display-1">

            Bootstrap Typography

        </h1>

        <p class="lead">

            This is lead text example.

        </p>

        <p class="text-muted">

            Muted paragraph example.

        </p>

        <p class="fw-bold">

            Bold text using Bootstrap.

        </p>

    </div>

</body>

</html>
