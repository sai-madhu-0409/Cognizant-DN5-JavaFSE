<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Two Column Layout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

    <div class="container-fluid">

        <div class="row">

            <!-- Sidebar -->

            <div class="col-md-3 bg-dark text-white p-5">

                <h3>

                    Sidebar

                </h3>

                <ul class="list-unstyled">

                    <li>Dashboard</li>
                    <li>Profile</li>
                    <li>Settings</li>

                </ul>

            </div>

            <!-- Content -->

            <div class="col-md-9 bg-light p-5">

                <h2>

                    Main Content Area

                </h2>

                <p>

                    This layout uses Bootstrap grid system.

                </p>

            </div>

        </div>

    </div>

</body>

</html>
